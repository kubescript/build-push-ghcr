name: 'Build and Push Docker Image to GHCR'
description: 'Build and push Docker images to GitHub Container Registry (GHCR) with smart tagging and layer caching'
author: 'KubeScript'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  image-name:
    description: 'Image name under ghcr.io/<owner>/ (e.g., my-service)'
    required: true
  token:
    description: 'GitHub token used to authenticate with GHCR. Must have packages:write permission. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
  docker-file-path:
    description: 'Path to Dockerfile relative to repo root'
    required: false
    default: 'Dockerfile'
  docker-build-context:
    description: 'Docker build context directory'
    required: false
    default: '.'
  docker-build-target:
    description: 'Multi-stage build target. Empty = build the final stage.'
    required: false
    default: ''
  docker-build-args:
    description: 'Docker build arguments, one KEY=VALUE per line'
    required: false
    default: ''
  tags:
    description: 'Tag rules for docker/metadata-action, one rule per line. See https://github.com/docker/metadata-action#tags-input'
    required: false
    default: |
      type=ref,event=pr,prefix=pr-
      type=ref,event=branch
      type=sha,prefix=sha-,format=short
      type=semver,pattern={{version}}
      type=raw,value=latest,enable={{is_default_branch}}
  labels:
    description: 'OCI image labels, one KEY=VALUE per line'
    required: false
    default: |
      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      org.opencontainers.image.revision=${{ github.sha }}
  platforms:
    description: 'Comma-separated target platforms (e.g., linux/amd64,linux/arm64). Empty = runner native.'
    required: false
    default: ''
  cache-from:
    description: 'BuildKit cache source. Empty to disable cache reads.'
    required: false
    default: 'type=gha'
  cache-to:
    description: 'BuildKit cache destination. Ignored when push is false.'
    required: false
    default: 'type=gha,mode=max'
  push:
    description: "Whether to push the image. Set to 'false' for build-only validation runs."
    required: false
    default: 'true'

outputs:
  version:
    description: 'Version resolved by docker/metadata-action (semver on tag builds, branch name otherwise)'
    value: ${{ steps.meta.outputs.version }}
  image-tags:
    description: 'Newline-separated list of all tags pushed'
    value: ${{ steps.meta.outputs.tags }}
  image-repo:
    description: 'Full image repository without tag (e.g., ghcr.io/my-org/my-service)'
    value: ${{ steps.image.outputs.value }}
  image-digest:
    description: 'Image digest of the pushed manifest (sha256:...)'
    value: ${{ steps.push.outputs.digest }}

runs:
  using: 'composite'
  steps:
    - name: Resolve image repository
      id: image
      shell: bash
      run: echo "value=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"

    - name: Compute image tags and labels
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.image.outputs.value }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push image
      id: push
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.docker-build-context }}
        file: ${{ inputs.docker-file-path }}
        target: ${{ inputs.docker-build-target }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        build-args: ${{ inputs.docker-build-args }}
        cache-from: ${{ inputs.cache-from }}
        cache-to: ${{ inputs.push == 'true' && inputs.cache-to || '' }}
        secrets: |
          github_packages_token=${{ inputs.token }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
